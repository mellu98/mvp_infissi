services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: mvp_infissi
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d mvp_infissi"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/mvp_infissi?schema=public
      NEXTAUTH_URL: http://localhost:3000
      NEXTAUTH_SECRET: replace-me-with-random-32-bytes
      AUTH_TRUST_HOST: "true"
      STORAGE_PROVIDER: local
      LOCAL_UPLOAD_DIR: /app/uploads
      AI_PROVIDER: mock
      ALLOW_PROD_SEED: "false"
    ports:
      - "3000:3000"
    volumes:
      - uploads:/app/uploads
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  uploads:
